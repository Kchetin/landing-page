server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Svelte/Vite genera una SPA con un solo index.html
    # try_files intenta el archivo, luego la carpeta, y cae al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets con hash (JS, CSS, imágenes)
    # Vite les pone hash en el nombre, así que son inmutables
    location ~* \.(js|css|png|svg|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Tipos MIME explícitos para JS modules
    include /etc/nginx/mime.types;
    types {
        application/javascript js mjs;
    }

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}
